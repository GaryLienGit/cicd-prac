name: Flask CI/CD Pipeline

on: 
  push:
    branches:
      - main
      - dev        # 你可以在這裡加上你想觸發的其他分支
      - 'feature/*' # 甚至支援萬用字元，例如 feature/login

jobs: 
  test:
    runs-on: ubuntu-latest
    steps: 
      - name: 拉取程式碼
        uses: actions/checkout@v4
 
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 執行測試
        run: pytest -v

  docker-push:
    runs-on: ubuntu-latest
    needs: test  # 等待 test 階段成功才執行
    env:
      # 統一在這裡設定你的 Docker Hub 帳號與專案名稱
      IMAGE_NAME: gary2662/docker-demo
      
    steps: 
      - name: 拉取程式碼
        uses: actions/checkout@v4

      # 第一步：先建置一個本地暫時用的映像檔
      - name: 建立本地 Docker 映像檔
        run: docker build -t my-flask-py .

      # 第二步：用這個本地映像檔來做健康檢查
      - name: 啟動容器並執行健康檢查
        run: |
          docker run -d --name app -p 5000:5000 my-flask-py
          sleep 5
          curl -f http://localhost:5000/health
          
      # 第三步：健康檢查過關！現在幫它貼上「遠端倉庫名稱:分支名稱」的標籤
      - name: 重新標記準備推送
        run: docker tag my-flask-py ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: 登入 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 第四步：推送到 Docker Hub
      - name: 推送 Docker 映像檔
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}