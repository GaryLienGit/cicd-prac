on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4
 
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 安裝依賴
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 執行測試
        run:  pytest -m pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 拉取程式碼
        uses: actions/checkout@v4

      - name: 建立 Docker 映像檔
        run: docker build -t my-flask-py .

      - run: docker run -d --name app -p 5000:5000 my-flask-py && sleep 5 && curl -f http://localhost:5000/health 